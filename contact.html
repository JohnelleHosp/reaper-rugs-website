<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Reaper Rugs</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <nav>
                <ul id="sidemenu">
                    <li><a href="homepage.html">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
        <section class="contact">
            <img src="images/logo1.png" alt="reaper rugs">
            <form id="contactForm">
                <label for="firstName">First Name:</label><br>
                <input type="text" id="firstName" name="firstName" placeholder="First Name" required><br>

                <label for="lastName">Last Name:</label><br>
                <input type="text" id="lastName" name="lastName" placeholder="Last Name" required><br>

                <label for="email">Email Address:</label><br>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required><br>

                <label for="phone">Phone Number:</label><br>
                <input type="tel" id="phone" name="phone" placeholder="Phone Number" required><br>

                <label for="questions">Your Message:</label><br>
                <textarea id="questions" name="questions" placeholder="Write your message here"></textarea><br>

                <button type="submit" class="btn">Submit</button>
            </form>
        </section>
    </body>
</html>
